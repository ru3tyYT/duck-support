site_name: Troubleshooting Hub
site_description: A troubleshooting hub for Revolution Macro and RDP issues
site_url: https://ru3tyyt.github.io/duck-support/

extra_css:
  - assets/stylesheets/custom.css

theme:
  name: material
  features:
    - navigation.sections
    - navigation.instant
    - navigation.path
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - toc.integrate
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: deep orange
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search:
      lang: en

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences

nav:
  - Home: index.md
  - Revolution Macro:
      - revolution-macro/index.md
      - revolution-macro/troubleshooting.md
      - revolution-macro/common-errors.md
      - revolution-macro/connection-issues.md
      - revolution-macro/rdp-issues.md
      - revolution-macro/mac-issues.md
  - RDP Setup:
      - rdp-troubleshooting/rdp-setup.md
  - RDP Troubleshooting:
      - rdp-troubleshooting/index.md
      - rdp-troubleshooting/connection-issues.md
      - rdp-troubleshooting/rdp-wrapper.md
      - rdp-troubleshooting/common-errors.md
  - Optimization:
      - optimization/index.md
